name: EATGF Engine CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      # --- REGISTRY VALIDATION ---
      - name: Validate Registry Structure
        run: |
          python -m eatgf_engine.cli.main validate-registry registry_v1.1.json

      # --- HAPPY PATH EVALUATION ---
      - name: Run Compliance Evaluation (Happy Path)
        run: |
          python -m eatgf_engine.cli.main evaluate-compliance registry_v1.1.json org_profile.json evidence.json

      # --- ZERO EVIDENCE REGRESSION ---
      - name: Zero Evidence Test
        run: |
          python -m eatgf_engine.cli.main evaluate-compliance registry_v1.1.json org_profile.json tests/ci_zero_evidence.json

      # --- NEGATIVE STATUS TEST (MUST FAIL) ---
      - name: Negative Evidence Test (Expect Failure)
        run: |
          python -m eatgf_engine.cli.main evaluate-compliance registry_v1.1.json org_profile.json tests/ci_invalid_status.json && exit 1 || exit 0
